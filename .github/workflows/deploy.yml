# =============================================================================
# Deploy Jekyll blog to GitHub Pages
#
# Uses Jekyll 4.x (not the older github-pages gem) so Mermaid,
# modern SCSS, and all Jekyll 4 features work correctly.
#
# Trigger: every push to main branch.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-flight runs if a newer push comes in.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------ Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true      # Caches gems between runs — faster builds

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # ----------------------------------------------------------------- Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
