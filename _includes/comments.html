<section class="comments-section" id="comments">
  <div class="container">

    <div class="comments-header">
      <h2 class="comments-title">Discussion</h2>
      <p class="comments-note">
        Powered by <a href="https://giscus.app" target="_blank" rel="noopener noreferrer">Giscus</a>
        via GitHub Discussions. A GitHub account is required to comment.
      </p>
    </div>

    <!--
      GISCUS CONFIGURATION — TWO PLACEHOLDERS TO FILL IN BEFORE PUBLISHING:
      =========================================================================
      Step 1: Enable GitHub Discussions on your repo:
              GitHub repo → Settings → General → Features → check "Discussions"

      Step 2: Install Giscus GitHub App:
              https://github.com/apps/giscus → Install → select this repo only

      Step 3: Go to https://giscus.app, enter your repo name, then copy:
              - data-repo-id       (replace REPO_ID_PLACEHOLDER below)
              - data-category-id   (replace CATEGORY_ID_PLACEHOLDER below)

      Step 4: Create a Discussion category called "Blog Comments" in your repo's
              Discussions tab before the first comment is posted.

      After repo rename to thinkidentity.github.io, also update data-repo value.
      =========================================================================
    -->
    <script src="https://giscus.app/client.js"
        data-repo="thinkIdentity/thinkIdentity.github.io"
            data-repo-id="R_kgDOSnWR-g"
            data-category="Blog Comments"
            data-category-id="DIC_kwDOSnWR-s4C-JyQ"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="en"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
    <!-- Giscus theme is synced by theme.js via postMessage when the toggle fires.
         On first load, watchForGiscus() in theme.js waits for the iframe to appear
         and then sends the correct theme (dark_dimmed or light). -->
    <script>
      // Set initial Giscus theme once the iframe finishes loading
      window.addEventListener('message', function onGiscusReady(event) {
        if (event.origin !== 'https://giscus.app') return;
        if (event.data && event.data.giscus && event.data.giscus.discussion !== undefined) {
          // Giscus iframe is ready — sync theme
          var theme = document.documentElement.getAttribute('data-theme') || 'light';
          var iframe = document.querySelector('iframe.giscus-frame');
          if (iframe) {
            iframe.contentWindow.postMessage(
              { giscus: { setConfig: { theme: theme === 'dark' ? 'dark_dimmed' : 'light' } } },
              'https://giscus.app'
            );
          }
          window.removeEventListener('message', onGiscusReady);
        }
      });
    </script>

    <noscript>
      <p class="comments-noscript">
        Comments require JavaScript. Please enable it to join the discussion.
      </p>
    </noscript>

  </div>
</section>
