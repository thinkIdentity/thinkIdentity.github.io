<header class="site-header" id="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-brand">
      <span class="brand-name">{{ site.title }}</span>
      <span class="brand-tagline">{{ site.tagline }}</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" role="list">
        {% for link in site.nav_links %}
        <li>
          <a href="{{ link.url | relative_url }}"
             class="nav-link {% if page.url contains link.url %}active{% endif %}"
             {% if link.accent %}style="--accent: {{ link.accent }}"{% endif %}>
            {%- if link.icon %}<span class="nav-icon" aria-hidden="true">{{ link.icon }}</span>{% endif -%}
            {{ link.title }}
          </a>
        </li>
        {% endfor %}
      </ul>

      <!-- Dark / Light mode toggle — top-right of header -->
      <button id="theme-toggle"
              class="theme-toggle"
              aria-label="Switch to dark mode"
              title="Switch to dark mode">
        <!-- Sun: shown in dark mode, click to go light -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon: shown in light mode, click to go dark -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>

<script>
  // Mobile nav toggle
  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.querySelector('.nav-toggle');
    var navLinks = document.querySelector('.nav-links');
    if (toggle) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', !expanded);
        navLinks.classList.toggle('open');
      });
    }
  });
</script>
