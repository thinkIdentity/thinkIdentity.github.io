<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Content Security Policy
     Restricts what resources can load on this page.
     - script-src:     self + jsDelivr (Mermaid) + giscus.app (comments) + 'unsafe-inline' for nav toggle
     - style-src:      self + 'unsafe-inline' for CSS custom properties
     - img-src:        self, data URIs (Mermaid SVG), any https image
     - connect-src:    giscus.app + api.github.com (Giscus fetches GitHub Discussions API)
     - frame-src:      giscus.app (Giscus widget runs inside an iframe)
     - object-src:     blocked entirely (no Flash/plugins)
     - frame-ancestors: blocks this site from being embedded (anti-clickjacking)
     - base-uri:       prevents <base> tag injection attacks
     - form-action:    no forms on this blog
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src     'none';
  script-src      'self' https://cdn.jsdelivr.net https://giscus.app 'unsafe-inline';
  style-src       'self' 'unsafe-inline';
  img-src         'self' data: https:;
  font-src        'self';
  connect-src     https://giscus.app https://api.github.com;
  object-src      'none';
  base-uri        'self';
  form-action     'none';
  frame-src       https://giscus.app;
  frame-ancestors 'none';
">

<title>
  {%- if page.title -%}
    {{ page.title }} — {{ site.title }}
  {%- else -%}
    {{ site.title }} | {{ site.tagline }}
  {%- endif -%}
</title>

<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">

<!-- SEO -->
{% seo %}

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Syntax highlighting (Rouge) -->
<link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">

<!-- RSS Feed autodiscovery (lets browsers and RSS readers find the feed automatically) -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
