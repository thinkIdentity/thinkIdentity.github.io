{% if page.mermaid or layout.mermaid %}
<!-- Mermaid.js — loaded only on pages that declare mermaid: true in front matter -->
<!-- Pinned to exact version with SRI hash — update both when upgrading Mermaid.
     To regenerate hash: curl -s <url> | openssl dgst -sha384 -binary | openssl base64 -A -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js"
        integrity="sha384-yQ4mmBBT+vhTAwjFH0toJXNYJ6O4usWnt6EPIdWwrRvx2V/n5lXuDZQwQFeSFydF"
        crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Convert kramdown-rendered fenced code blocks (```mermaid) into Mermaid divs.
    // Kramdown renders them as: <pre><code class="language-mermaid">...</code></pre>
    document.querySelectorAll('code.language-mermaid').forEach(function (el) {
      var pre = el.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      pre.parentNode.replaceChild(div, pre);
    });

    // Initialise Mermaid with theme settings
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        primaryColor:    '#2563eb',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#1d4ed8',
        lineColor:       '#64748b',
        secondaryColor:  '#f1f5f9',
        tertiaryColor:   '#e2e8f0',
        fontFamily:      '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
        fontSize:        '14px'
      },
      flowchart: { curve: 'basis' },
      sequence: { actorMargin: 50 }
    });
  });
</script>
{% endif %}
